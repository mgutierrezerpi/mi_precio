<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="base.css" rel="stylesheet">
</head>
<body>
<div class="placa">
  <div class="wrap">
    <img class="logo" src="logo-white.webp" alt="MiPrecio">

    <div class="body steps">
      <div class="step-head">
        <div class="step-badge">1</div>
        <div class="step-title">Cargá tus<br>productos</div>
      </div>
      <div class="step-sub">Armá tu catálogo en minutos, sin planillas.</div>
      <ul class="feats">
        <li><b>✓</b> Nombre, precio y stock</li>
        <li><b>✓</b> Sin límite de productos</li>
        <li><b>✓</b> Ordenados por categoría</li>
      </ul>
    </div>

    <div class="footer">
      <div class="dots"><i></i><i class="on"></i><i></i><i></i></div>
      <div class="handle">miprecio.app</div>
    </div>
  </div>
</div>
</body>
</html>
