<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="base.css" rel="stylesheet">
</head>
<body>
<div class="placa">
  <div class="wrap">
    <img class="logo" src="logo-white.webp" alt="MiPrecio">

    <div class="body steps">
      <div class="step-head">
        <div class="step-badge">2</div>
        <div class="step-title">Armá tu lista y compartila</div>
      </div>
      <div class="step-sub">Por link o código QR. Sin descargar nada.</div>

      <div class="mock">
        <img class="qrimg" src="qr-miprecio.png" alt="QR a miprecio.app">
        <div style="display:flex; flex-direction:column; gap:22px">
          <div class="linkpill">🔗 &nbsp;miprecio.app/tu-negocio</div>
          <div class="linkpill" style="background:rgba(253,230,138,.18); border-color:rgba(253,230,138,.5)">📲 &nbsp;Escaneá y ves la lista</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="dots"><i></i><i></i><i class="on"></i><i></i></div>
      <div class="handle">miprecio.app</div>
    </div>
  </div>
</div>
</body>
</html>
