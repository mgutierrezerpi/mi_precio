name: mi_precio

services:
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    image: mi_precio/landing:dev
    ports:
      - "${LANDING_PORT:-8088}:80"
    depends_on:
      - api
      - web_app

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: mi_precio/api:dev
    environment:
      APP_NAME: Mi Precio API
      DEBUG: "true"
      DATABASE_PATH: /data/mi_precio.db
      SECRET_KEY: change_me_for_local_development
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000", "http://localhost:5173", "https://miprecio.app", "https://www.miprecio.app"]}'
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAILER_ENABLED: ${MAILER_ENABLED:-false}
      LOG_AUTH_CODES: ${LOG_AUTH_CODES:-true}
      STORAGE_ENDPOINT_URL: http://storage:9000
      STORAGE_PUBLIC_URL: http://localhost:${STORAGE_PORT:-9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-product-pictures}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-mi_precio_local}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-mi_precio_local_secret}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_data:/data
    depends_on:
      storage_setup:
        condition: service_completed_successfully

  storage:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-mi_precio_local}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-mi_precio_local_secret}
    ports:
      - "${STORAGE_PORT:-9000}:9000"
      - "127.0.0.1:${STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - storage_data:/data

  storage_setup:
    image: quay.io/minio/mc:latest
    depends_on:
      storage:
        condition: service_started
    environment:
      STORAGE_BUCKET: ${STORAGE_BUCKET:-product-pictures}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-mi_precio_local}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-mi_precio_local_secret}
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://storage:9000 "$${STORAGE_ACCESS_KEY}" "$${STORAGE_SECRET_KEY}"; do sleep 1; done;
      mc mb --ignore-existing "local/$${STORAGE_BUCKET}";
      '

  web_app:
    build:
      context: ./web_app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:${API_PORT:-8000}/api/v1}"
    image: mi_precio/web_app:dev
    ports:
      - "${WEB_APP_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  api_data:
  storage_data:
