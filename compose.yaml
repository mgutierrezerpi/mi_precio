name: mi_precio

services:
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    image: mi_precio/landing:dev
    ports:
      - "${LANDING_PORT:-8088}:80"
    depends_on:
      - api
      - web_app

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: mi_precio/api:dev
    environment:
      APP_NAME: Mi Precio API
      DEBUG: "true"
      DATABASE_PATH: /data/mi_precio.db
      SECRET_KEY: change_me_for_local_development
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000", "http://localhost:5173", "https://miprecio.app", "https://www.miprecio.app"]}'
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MAILER_ENABLED: ${MAILER_ENABLED:-false}
      LOG_AUTH_CODES: ${LOG_AUTH_CODES:-true}
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      BILLING_MANUAL_SECRET: ${BILLING_MANUAL_SECRET:-}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY:-}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID:-}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET:-}
      LEMONSQUEEZY_VARIANT_MICRO: ${LEMONSQUEEZY_VARIANT_MICRO:-}
      LEMONSQUEEZY_VARIANT_PLUS: ${LEMONSQUEEZY_VARIANT_PLUS:-}
      LEMONSQUEEZY_VARIANT_PRO: ${LEMONSQUEEZY_VARIANT_PRO:-}
      ZOHODESK_API_BASE: ${ZOHODESK_API_BASE:-https://desk.zoho.com}
      ZOHODESK_ACCOUNTS_BASE: ${ZOHODESK_ACCOUNTS_BASE:-https://accounts.zoho.com}
      ZOHODESK_ORG_ID: ${ZOHODESK_ORG_ID:-932619854}
      ZOHODESK_CLIENT_ID: ${ZOHODESK_CLIENT_ID:-}
      ZOHODESK_CLIENT_SECRET: ${ZOHODESK_CLIENT_SECRET:-}
      ZOHODESK_REFRESH_TOKEN: ${ZOHODESK_REFRESH_TOKEN:-}
      ZOHODESK_DEPARTMENT_ID: ${ZOHODESK_DEPARTMENT_ID:-}
      STORAGE_ENDPOINT_URL: http://storage:9000
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-http://localhost:${STORAGE_PORT:-9000}}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-product-pictures}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-mi_precio_local}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-mi_precio_local_secret}
      # Web Push (PWA notifications). Generate: pipenv run python bin/generate_vapid_keys.py
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:soporte@miprecio.app}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - api_data:/data
    depends_on:
      storage_setup:
        condition: service_completed_successfully

  storage:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-mi_precio_local}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-mi_precio_local_secret}
    ports:
      - "${STORAGE_PORT:-9000}:9000"
      - "127.0.0.1:${STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - storage_data:/data

  storage_setup:
    image: quay.io/minio/mc:latest
    depends_on:
      storage:
        condition: service_started
    environment:
      STORAGE_BUCKET: ${STORAGE_BUCKET:-product-pictures}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-mi_precio_local}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-mi_precio_local_secret}
    entrypoint: >
      /bin/sh -c '
      until mc alias set local http://storage:9000 "$${STORAGE_ACCESS_KEY}" "$${STORAGE_SECRET_KEY}"; do sleep 1; done;
      mc mb --ignore-existing "local/$${STORAGE_BUCKET}";
      mc anonymous set download "local/$${STORAGE_BUCKET}";
      '

  web_app:
    build:
      context: ./web_app
      # Dev image runs the Vite dev server (HMR). The production build lives in
      # ./web_app/Dockerfile and is used by compose.production.yaml / deploy.
      dockerfile: Dockerfile.dev
    image: mi_precio/web_app:dev
    environment:
      VITE_API_URL: "http://localhost:${API_PORT:-8000}/api/v1"
      # Reliable file watching for Vite HMR inside Docker on Windows/macOS.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Live-mount the source so edits hot-reload without rebuilding the image.
      - ./web_app:/app
      # Keep the container's Linux node_modules (don't let the host shadow it).
      - /app/node_modules
    ports:
      - "${WEB_APP_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  api_data:
  storage_data:
