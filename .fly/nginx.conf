server {
  listen 8081;
  server_name _;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /app_assets/ {
    root /usr/share/nginx/web_app;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location ~ ^/(admin|login|p|old_landing)(/.*)?$ {
    root /usr/share/nginx/web_app;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files /index.html =404;
  }

  location ~ ^/(manifest\.webmanifest|sw\.js|workbox-[^/]+\.js|favicon\.svg|miprecio-favicon\.png|apple-touch-icon\.png|pwa-[^/]+\.png|logo\.svg|hero-img\.webp|mockup-img\.webp|miprecio-logo-[^/]+\.webp)$ {
    root /usr/share/nginx/web_app;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=604800";
  }

  location /assets/ {
    root /usr/share/nginx/landing;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /images/ {
    root /usr/share/nginx/landing;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=604800";
  }

  location /product-pictures/ {
    alias /var/lib/litefs/product-pictures/;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    root /usr/share/nginx/landing;
    try_files $uri $uri/ /index.html;
  }
}
