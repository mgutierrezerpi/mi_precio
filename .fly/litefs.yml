fuse:
  dir: "/litefs"

data:
  dir: "/var/lib/litefs"

exit-on-error: false

proxy:
  addr: ":8080"
  target: "localhost:8081"
  db: "mi_precio.db"
  passthrough:
    - "*.css"
    - "*.js"
    - "*.ico"
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.svg"
    - "*.webp"

exec:
  - cmd: "/app/.fly/start.sh"

lease:
  type: "consul"
  advertise-url: "http://${HOSTNAME}.vm.${FLY_APP_NAME}.internal:20202"
  candidate: ${FLY_REGION == PRIMARY_REGION}
  promote: true
  consul:
    url: "${FLY_CONSUL_URL}"
    key: "litefs/${FLY_APP_NAME}"
