server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /old_landing {
    return 302 http://localhost:3000/old_landing;
  }

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /images/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=604800";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
