name: mi_precio

services:
  miprecio-landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: miprecio/landing:latest
    container_name: miprecio-landing
    restart: unless-stopped
    ports:
      - "${MIPRECIO_PORT:-8088}:80"
    networks:
      - miprecio_landing

networks:
  miprecio_landing:
    name: miprecio_landing
